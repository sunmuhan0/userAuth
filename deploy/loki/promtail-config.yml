server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 采集 /var/log/work/ 下所有服务日志
  # 日志路径格式：/var/log/work/{服务名}_{端口}/{日期}.log
  - job_name: ttuser
    static_configs:
      - targets:
          - localhost
        labels:
          job: ttuser
          env: dev
          __path__: /var/log/work/**/*.log
    pipeline_stages:
      # 解析JSON日志，提取字段作为标签
      - json:
          expressions:
            level: level
            trace_id: trace_id
            msg: msg
      - labels:
          level:
      # 从文件路径中提取服务名
      - regex:
          source: filename
          expression: '/var/log/work/(?P<service>[^/]+)/'
      - labels:
          service:
