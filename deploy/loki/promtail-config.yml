server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 采集docker容器stdout日志（适用于docker-compose部署的服务）
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: ttuser
          __path__: /var/log/ttuser/*.log

  # 如果服务以docker容器方式运行，可以用docker driver直接采集
  # - job_name: containers
  #   docker_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #   relabel_configs:
  #     - source_labels: ['__meta_docker_container_name']
  #       target_label: 'container'

  # 采集本地日志文件（适用于非容器化部署）
  - job_name: local
    static_configs:
      - targets:
          - localhost
        labels:
          job: ttuser-local
          env: dev
          __path__: /var/log/ttuser/**/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            msg: msg
      - labels:
          level:
          trace_id:
