global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: proc
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: auth-server
    static_configs:
      - targets: ["host.docker.internal:9190"]

  - job_name: config-server
    static_configs:
      - targets: ["host.docker.internal:7963"]
